name: Publish to npm

# Publishes whenever a version tag (v1.2.3) is pushed.
# Auth is via npm Trusted Publishing (OIDC) — no tokens or secrets.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC trusted publishing + provenance
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing requires npm >= 11.5.1; Node 20 ships an older npm.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      # Fail early if the tag doesn't match package.json version, so the tag
      # and the published version can never drift apart.
      - name: Verify tag matches package version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version $PKG" >&2
            exit 1
          fi

      # No NODE_AUTH_TOKEN — OIDC handles auth. --provenance attaches a signed
      # build attestation linking the package to this commit and workflow.
      - name: Publish
        run: npm publish --provenance --access public
